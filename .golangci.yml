# Configuration for golangci-lint v2, scoped to documentation rules.
#
# This file backs the `make doc-lint` target and the `doc-lint` GitHub Actions
# workflow. The full Phase 0–13 rollout has documented every package; this
# config enforces the result with severity = error so future PRs that
# introduce new exported symbols without godoc fail CI.
#
# Configured rules:
#   - revive `exported`         — exported symbols must have godoc.
#   - revive `package-comments` — every package needs a doc.go comment.
#
# Both rules respect the `Code generated .* DO NOT EDIT.` marker, so
# generated protobuf files (.pb.go) are skipped automatically. Test mocks
# under /mock/ are also excluded.
version: "2"
run:
  go: "1.20"
  tests: false
linters:
  default: none
  enable:
    - revive
  settings:
    revive:
      confidence: 0.8
      severity: error
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
          severity: error
          disabled: false
        - name: package-comments
          severity: error
          disabled: false
  exclusions:
    generated: lax
    rules:
      - linters:
          - revive
        path: \.pb\.go$
      - linters:
          - revive
        path: /mock/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
severity:
  default: error
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
