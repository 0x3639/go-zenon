name: Doc lint

on:
  pull_request:
    branches:
      - master
      - 'docs/**'
  push:
    branches:
      - master
      - 'docs/**'
  workflow_dispatch:

# Documentation enforcement for godoc coverage. This workflow runs revive's
# `exported` and `package-comments` rules in error mode so new exported
# symbols and packages keep their godoc comments.

permissions:
  contents: read

jobs:
  harden_security:
    name: Harden Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Ensure SHA pinned actions
        uses: zgosalvez/github-actions-ensure-sha-pinned-actions@2d6823da4039243036c86d76f503c84e2ded2517 # v3.0.16

  doc-lint:
    needs: harden_security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: '1.20'
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.6.2

      - name: Run doc lint
        env:
          GOWORK: off
        run: |
          "$(go env GOPATH)/bin/golangci-lint" run \
            --config=.golangci.yml \
            --out-format=colored-line-number \
            ./...
