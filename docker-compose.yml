services:
  pillar:
    build:
      context: .
      dockerfile: Dockerfile
    image: go-zenon-devnet:latest
    container_name: znnd-devnet-pillar
    restart: unless-stopped
    environment:
      ZNND_ROLE: pillar
    expose:
      - "35995"
    ports:
      - "35991:35997" # HTTP RPC write endpoint for local integration tests
    volumes:
      - pillar-data:/root/.znn
    networks:
      devnet:
        ipv4_address: 172.30.0.10

  rpc:
    image: go-zenon-devnet:latest
    container_name: znnd-devnet-rpc
    restart: unless-stopped
    depends_on:
      - pillar
      - observer
    environment:
      ZNND_ROLE: rpc
    ports:
      - "35997:35997" # HTTP RPC
      - "35998:35998" # WS RPC
    volumes:
      - rpc-data:/root/.znn
    networks:
      devnet:
        ipv4_address: 172.30.0.11

  observer:
    image: go-zenon-devnet:latest
    container_name: znnd-devnet-observer
    restart: unless-stopped
    depends_on:
      - pillar
    environment:
      ZNND_ROLE: observer
    expose:
      - "35995"
    volumes:
      - observer-data:/root/.znn
    networks:
      devnet:
        ipv4_address: 172.30.0.14

  explorer:
    build:
      context: .
      dockerfile: docker/explorer/Dockerfile
    image: go-zenon-devnet-explorer:latest
    container_name: znnd-devnet-explorer
    restart: unless-stopped
    depends_on:
      - rpc
    environment:
      EXPLORER_DEFAULT_ENDPOINT: ${EXPLORER_DEFAULT_ENDPOINT:-http://localhost:35997}
    ports:
      - "36000:80" # Zenon explorer
    networks:
      - devnet

networks:
  devnet:
    name: znnd-devnet
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24

volumes:
  pillar-data:
    driver: local
  rpc-data:
    driver: local
  observer-data:
    driver: local
