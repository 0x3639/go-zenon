x-devnet-labels: &devnet-labels
  network.zenon.devnet: "true"
  network.zenon.devnet.project: "${COMPOSE_PROJECT_NAME:-znnd-devnet}"
  network.zenon.devnet.branch: "${DEVNET_BRANCH:-unknown}"
  network.zenon.devnet.commit: "${DEVNET_COMMIT:-unknown}"
  network.zenon.devnet.checkout: "${DEVNET_CHECKOUT:-unknown}"

services:
  pillar:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DEVNET_NODE_IMAGE:-go-zenon-devnet:latest}
    labels: *devnet-labels
    restart: unless-stopped
    environment:
      ZNND_ROLE: pillar
    expose:
      - "35995"
    ports:
      - "${DEVNET_PILLAR_HTTP_PORT:-35991}:35997" # HTTP RPC write endpoint for local integration tests
    volumes:
      - pillar-data:/root/.znn
    networks:
      devnet:
        ipv4_address: 172.30.0.10

  pillar2:
    image: ${DEVNET_NODE_IMAGE:-go-zenon-devnet:latest}
    labels: *devnet-labels
    restart: unless-stopped
    depends_on:
      - pillar
    environment:
      ZNND_ROLE: pillar2
    expose:
      - "35995"
    volumes:
      - pillar2-data:/root/.znn
    networks:
      devnet:
        ipv4_address: 172.30.0.12

  pillar3:
    image: ${DEVNET_NODE_IMAGE:-go-zenon-devnet:latest}
    labels: *devnet-labels
    restart: unless-stopped
    depends_on:
      - pillar
    environment:
      ZNND_ROLE: pillar3
    expose:
      - "35995"
    volumes:
      - pillar3-data:/root/.znn
    networks:
      devnet:
        ipv4_address: 172.30.0.13

  rpc:
    image: ${DEVNET_NODE_IMAGE:-go-zenon-devnet:latest}
    labels: *devnet-labels
    restart: unless-stopped
    depends_on:
      - pillar
      - observer
    environment:
      ZNND_ROLE: rpc
    ports:
      - "${DEVNET_HTTP_PORT:-35997}:35997" # HTTP RPC
      - "${DEVNET_WS_PORT:-35998}:35998" # WS RPC
    volumes:
      - rpc-data:/root/.znn
    networks:
      devnet:
        ipv4_address: 172.30.0.11

  observer:
    image: ${DEVNET_NODE_IMAGE:-go-zenon-devnet:latest}
    labels: *devnet-labels
    restart: unless-stopped
    depends_on:
      - pillar
    environment:
      ZNND_ROLE: observer
    expose:
      - "35995"
    volumes:
      - observer-data:/root/.znn
    networks:
      devnet:
        ipv4_address: 172.30.0.14

  explorer:
    build:
      context: .
      dockerfile: docker/explorer/Dockerfile
    image: ${DEVNET_EXPLORER_IMAGE:-go-zenon-devnet-explorer:latest}
    labels: *devnet-labels
    restart: unless-stopped
    depends_on:
      - rpc
    environment:
      EXPLORER_DEFAULT_ENDPOINT: "${EXPLORER_DEFAULT_ENDPOINT:-http://localhost:35997}"
    ports:
      - "${DEVNET_EXPLORER_PORT:-35999}:80" # Zenon explorer
    networks:
      - devnet

networks:
  devnet:
    name: znnd-devnet
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24

volumes:
  pillar-data:
    driver: local
  pillar2-data:
    driver: local
  pillar3-data:
    driver: local
  rpc-data:
    driver: local
  observer-data:
    driver: local
